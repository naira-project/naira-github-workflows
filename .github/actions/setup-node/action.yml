name: "Naira: Setup Node"
description: "Sets up Node.js with npm/yarn/pnpm caching."

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "20"
  package-manager:
    description: "npm | yarn | pnpm"
    required: false
    default: "npm"
  working-directory:
    description: "Directory containing package-lock.json / yarn.lock"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.package-manager }}
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Setup pnpm
      if: inputs.package-manager == 'pnpm'
      uses: pnpm/action-setup@v4

    - name: Print Node version
      shell: bash
      run: node --version && ${{ inputs.package-manager }} --version
