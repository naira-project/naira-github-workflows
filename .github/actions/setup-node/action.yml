name: "Naira: Setup Node"
description: |
  Sets up Node.js with npm/yarn/pnpm caching.
  NOTE: This composite action is a reusable template for consumer repositories.
  The reusable workflows in this repo inline equivalent logic directly, as relative
  action paths (./) in workflow_call resolve to the caller's repo, not this one.

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "20"
  package-manager:
    description: "npm | yarn | pnpm"
    required: false
    default: "npm"
  working-directory:
    description: "Directory containing package-lock.json / yarn.lock / pnpm-lock.yaml"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    # Resolve the correct lockfile for the chosen package manager.
    # Each package manager uses a different lockfile name; using the wrong
    # one produces incorrect cache keys and stale caches.
    - name: Resolve lockfile path
      id: lockfile
      shell: bash
      run: |
        case "${INPUTS_PACKAGE_MANAGER}" in
          yarn) echo "path=${INPUTS_WORKING_DIRECTORY}/yarn.lock" >> "$GITHUB_OUTPUT" ;;
          pnpm) echo "path=${INPUTS_WORKING_DIRECTORY}/pnpm-lock.yaml" >> "$GITHUB_OUTPUT" ;;
          *)    echo "path=${INPUTS_WORKING_DIRECTORY}/package-lock.json" >> "$GITHUB_OUTPUT" ;;
        esac
      env:
        INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}
        INPUTS_WORKING_DIRECTORY: ${{ inputs.working-directory }}

    # pnpm must be on PATH before actions/setup-node when cache: pnpm is set,
    # so that setup-node can locate pnpm and the lockfile for cache keying.
    - name: Setup pnpm
      if: inputs.package-manager == 'pnpm'
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.package-manager }}
        cache-dependency-path: ${{ steps.lockfile.outputs.path }}

    - name: Print Node version
      shell: bash
      run: node --version && ${INPUTS_PACKAGE_MANAGER} --version
      env:
        INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}
