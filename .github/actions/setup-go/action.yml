name: "Naira: Setup Go"
description: |
  Sets up Go with module caching. Use instead of actions/setup-go directly.
  NOTE: This composite action is a reusable template for consumer repositories.
  The reusable workflows in this repo inline equivalent logic directly, as relative
  action paths (./) in workflow_call resolve to the caller's repo, not this one.

inputs:
  go-version:
    description: "Go version to install"
    required: false
    default: "1.22"
  working-directory:
    description: "Directory containing go.sum for cache keying"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Set up Go ${{ inputs.go-version }}
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: ${{ inputs.working-directory }}/go.sum

    - name: Print Go version
      shell: bash
      run: go version
