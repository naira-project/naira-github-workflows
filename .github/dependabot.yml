#
# Dependabot configuration for the shared-workflows repo itself.
# Copy this to consuming repos and add their relevant ecosystems.

version: 2
updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    # Group all Actions updates into a single PR to reduce noise
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

