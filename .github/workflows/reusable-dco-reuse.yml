name: Reusable · DCO & REUSE Compliance

on:
  workflow_call:
    inputs:
      check-dco:
        description: "Enforce DCO sign-off on all commits"
        type: boolean
        default: true
      check-reuse:
        description: "Enforce REUSE/SPDX license compliance"
        type: boolean
        default: true
      reuse-version:
        description: "REUSE tool version"
        type: string
        default: "3.0.2"

jobs:
  dco-check:
    name: DCO Sign-off
    if: inputs.check-dco
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history needed to inspect all commits in the PR
          fetch-depth: 0
          persist-credentials: false

      - name: Check DCO sign-off
        uses: christophebedard/dco-check@ec8bfc43106afe98b323ace9133650df10497e12 # 0.5.1
        with:
          # Require Signed-off-by: on every commit, not just the PR body
          check-pr-description: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  reuse-check:
    name: REUSE License Compliance
    if: inputs.check-reuse
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: REUSE compliance check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
        # This action runs `reuse lint` and fails if any file is missing
        # a valid SPDX header or if a license is not present in LICENSES/

      - name: Generate REUSE SBOM (SPDX)
        # Produces a machine-readable bill of materials — useful for audits
        run: |
          pip install reuse==${INPUTS_REUSE_VERSION} --quiet --break-system-packages
          reuse spdx --output reuse-sbom.spdx
        env:
          INPUTS_REUSE_VERSION: ${{ inputs.reuse-version }}

      - name: Upload REUSE SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reuse-sbom-${{ github.sha }}
          path: reuse-sbom.spdx
          retention-days: 30
