name: Reusable · Go Test

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use"
        type: string
        default: "1.22"
      working-directory:
        description: "Directory containing go.mod"
        type: string
        default: "."
      run-race-detector:
        description: "Enable Go race detector"
        type: boolean
        default: true
      coverage-threshold:
        description: "Minimum coverage percentage (0 to disable)"
        type: number
        default: 0
      test-tags:
        description: "Build tags to pass to go test (e.g. 'integration')"
        type: string
        default: ""
    outputs:
      coverage:
        description: "Test coverage percentage"
        value: ${{ jobs.go-test.outputs.coverage }}

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      coverage: ${{ steps.coverage.outputs.pct }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Run tests
        run: |
          RACE_ARGS=()
          if [ "${{ inputs.run-race-detector }}" = "true" ]; then
            RACE_ARGS=("-race")
          fi

          TAG_ARGS=()
          if [ -n "${INPUTS_TEST_TAGS}" ]; then
            TAG_ARGS=("-tags" "${INPUTS_TEST_TAGS}")
          fi

          go test \
            "${RACE_ARGS[@]}" \
            "${TAG_ARGS[@]}" \
            -v \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...
        env:
          INPUTS_TEST_TAGS: ${{ inputs.test-tags }}

      - name: Extract coverage percentage
        id: coverage
        run: |
          PCT=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "### Test Coverage: ${PCT}%" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce coverage threshold
        if: inputs.coverage-threshold > 0
        run: |
          PCT=${STEPS_COVERAGE_OUTPUTS_PCT}
          THRESHOLD=${{ inputs.coverage-threshold }}
          # Use awk for float comparison
          PASS=$(awk -v p="$PCT" -v t="$THRESHOLD" 'BEGIN { print (p >= t) ? "yes" : "no" }')
          if [ "$PASS" = "no" ]; then
            echo "::error::Coverage ${PCT}% is below required threshold of ${THRESHOLD}%."
            exit 1
          fi
        env:
          STEPS_COVERAGE_OUTPUTS_PCT: ${{ steps.coverage.outputs.pct }}

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-${{ github.sha }}
          path: ${{ inputs.working-directory }}/coverage.out
          retention-days: 7

      - name: Upload coverage to Codecov
        # Only uploads if CODECOV_TOKEN is available in the calling repo
        id: codecov
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ${{ inputs.working-directory }}/coverage.out
          flags: unittests

      - name: Warn on Codecov upload failure
        if: steps.codecov.outcome == 'failure'
        run: echo "::warning::Codecov upload failed. Ensure CODECOV_TOKEN is configured in repository secrets."
