name: Reusable · Release

on:
  workflow_call:
    inputs:
      release-type:
        description: "release-please release type: go | node | helm | simple"
        type: string
        default: "go"
      release-branch:
        description: "Branch to cut releases from"
        type: string
        default: "main"
      config-file:
        description: "Path to release-please config. Use changelog-sections there for changelog grouping."
        type: string
        default: ""
      manifest-file:
        description: "Path to release-please manifest"
        type: string
        default: ""
      notify-slack:
        description: "Post Slack notification on release"
        type: boolean
        default: false
    secrets:
      github-token:
        description: "GitHub token with contents:write and pull-requests:write. Defaults to the built-in GITHUB_TOKEN."
        required: false
      slack-webhook:
        description: "Slack webhook URL for release notification"
        required: false
    outputs:
      release-created:
        description: "Whether a new release was created"
        value: ${{ jobs.release-please.outputs.release-created }}
      tag-name:
        description: "Tag name of the new release"
        value: ${{ jobs.release-please.outputs.tag-name }}
      version:
        description: "Released version (without v prefix)"
        value: ${{ jobs.release-please.outputs.version }}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.github-token || github.token }}
          release-type: ${{ inputs.release-type }}
          target-branch: ${{ inputs.release-branch }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          # Creates a "Release PR" that auto-bumps version and CHANGELOG.md
          # Merging the Release PR triggers the actual GitHub Release creation.

  # Runs only when a real release is created (Release PR merged)
  post-release:
    name: Post Release Tasks
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag-name }}

      - name: Write release summary
        run: |
          {
            echo "### 🚀 Release Published"
            echo "**Version:** \`${{ needs.release-please.outputs.tag-name }}\`"
            echo "**Branch:** \`${{ inputs.release-branch }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

