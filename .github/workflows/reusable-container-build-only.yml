name: Reusable · Container Build (no push)

on:
  workflow_call:
    inputs:
      image-name:
        description: "Container image name (e.g. naira-api). Defaults to repo name."
        type: string
        default: ""
      dockerfile:
        description: "Path to Dockerfile"
        type: string
        default: "Dockerfile"
      context:
        description: "Docker build context path"
        type: string
        default: "."
      platforms:
        description: "Comma-separated list of target platforms"
        type: string
        default: "linux/amd64,linux/arm64"
      registry:
        description: "Container registry hostname"
        type: string
        default: "ghcr.io"
      build-args:
        description: "Newline-separated Docker build args (KEY=VALUE)"
        type: string
        default: ""
      image-labels:
        description: "Extra OCI labels (newline-separated KEY=VALUE)"
        type: string
        default: ""
    outputs:
      image-digest:
        description: "Build image digest (sha256:...)"
        value: ${{ jobs.build-only.outputs.digest }}
      image-tags:
        description: "Comma-separated list of applied image tags"
        value: ${{ jobs.build-only.outputs.tags }}

jobs:
  build-only:
    name: Build (${{ inputs.platforms }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve image name
        id: image
        run: |
          NAME="${INPUTS_IMAGE_NAME}"
          if [ -z "$NAME" ]; then
            NAME="${INPUTS_REGISTRY}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          else
            NAME="${INPUTS_REGISTRY}/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/$NAME"
          fi
          echo "full=$NAME" >> "$GITHUB_OUTPUT"
        env:
          INPUTS_IMAGE_NAME: ${{ inputs.image-name }}
          INPUTS_REGISTRY: ${{ inputs.registry }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ steps.image.outputs.full }}
          labels: |
            org.opencontainers.image.vendor=Naira Project
            ${{ inputs.image-labels }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Build image (no push)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
