name: Reusable · Container Signature Verify

on:
  workflow_call:
    inputs:
      image-ref:
        description: "Full image ref including digest (e.g. ghcr.io/org/img@sha256:...)"
        type: string
        required: true
      certificate-identity-regexp:
        description: "Regexp matching the signing workflow's OIDC identity (job_workflow_ref)"
        type: string
        default: "https://github.com/naira-project/naira-github-workflows/.github/workflows/reusable-container-build.yml@.*"
      certificate-oidc-issuer:
        description: "Expected OIDC issuer"
        type: string
        default: "https://token.actions.githubusercontent.com"

jobs:
  verify:
    name: Verify Signature · ${{ inputs.image-ref }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-identity-regexp "${INPUTS_CERTIFICATE_IDENTITY_REGEXP}" \
            --certificate-oidc-issuer "${INPUTS_CERTIFICATE_OIDC_ISSUER}" \
            "${INPUTS_IMAGE_REF}"
        env:
          INPUTS_CERTIFICATE_IDENTITY_REGEXP: ${{ inputs.certificate-identity-regexp }}
          INPUTS_CERTIFICATE_OIDC_ISSUER: ${{ inputs.certificate-oidc-issuer }}
          INPUTS_IMAGE_REF: ${{ inputs.image-ref }}
