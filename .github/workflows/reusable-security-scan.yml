name: Reusable · Security Scan

on:
  workflow_call:
    inputs:
      scan-filesystem:
        description: "Run Trivy filesystem scan (dependencies, IaC)"
        type: boolean
        default: true
      scan-image:
        description: "Run Trivy container image scan"
        type: boolean
        default: false
      image-ref:
        description: "Container image to scan (required when scan-image=true)"
        type: string
        default: ""
      run-govulncheck:
        description: "Run govulncheck for Go modules"
        type: boolean
        default: true
      go-version:
        description: "Go version for govulncheck"
        type: string
        default: "1.22"
      working-directory:
        description: "Working directory (for govulncheck)"
        type: string
        default: "."
      severity:
        description: "Minimum severity threshold: CRITICAL | HIGH | MEDIUM | LOW. Scans for this severity and all above."
        type: string
        default: "HIGH"
      upload-sarif:
        description: "Upload results to GitHub Security tab (requires repo permissions)"
        type: boolean
        default: true

jobs:
  trivy-filesystem:
    name: Trivy · Filesystem Scan
    if: inputs.scan-filesystem
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write  # For SARIF upload

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Trivy --severity takes an explicit comma-separated list, not a threshold.
      # Map the input to include all severities at or above the requested minimum.
      - name: Compute severity list
        id: severity
        run: |
          case "${{ inputs.severity }}" in
            LOW)      echo "list=LOW,MEDIUM,HIGH,CRITICAL" >> "$GITHUB_OUTPUT" ;;
            MEDIUM)   echo "list=MEDIUM,HIGH,CRITICAL" >> "$GITHUB_OUTPUT" ;;
            HIGH)     echo "list=HIGH,CRITICAL" >> "$GITHUB_OUTPUT" ;;
            CRITICAL) echo "list=CRITICAL" >> "$GITHUB_OUTPUT" ;;
            *)        echo "list=HIGH,CRITICAL" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "${{ steps.severity.outputs.list }}"
          # Scan source code deps, IaC configs, and secrets
          scanners: "vuln,secret,misconfig"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        if: inputs.upload-sarif && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  trivy-image:
    name: Trivy · Image Scan
    if: inputs.scan-image && inputs.image-ref != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write

    steps:
      # Trivy --severity takes an explicit comma-separated list, not a threshold.
      # Map the input to include all severities at or above the requested minimum.
      - name: Compute severity list
        id: severity
        run: |
          case "${{ inputs.severity }}" in
            LOW)      echo "list=LOW,MEDIUM,HIGH,CRITICAL" >> "$GITHUB_OUTPUT" ;;
            MEDIUM)   echo "list=MEDIUM,HIGH,CRITICAL" >> "$GITHUB_OUTPUT" ;;
            HIGH)     echo "list=HIGH,CRITICAL" >> "$GITHUB_OUTPUT" ;;
            CRITICAL) echo "list=CRITICAL" >> "$GITHUB_OUTPUT" ;;
            *)        echo "list=HIGH,CRITICAL" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ inputs.image-ref }}
          format: "sarif"
          output: "trivy-image-results.sarif"
          severity: "${{ steps.severity.outputs.list }}"
          scanners: "vuln,secret"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        if: inputs.upload-sarif && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

  govulncheck:
    name: govulncheck · Go CVE Scan
    if: inputs.run-govulncheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.3

      - name: Run govulncheck
        run: govulncheck ./...
        # govulncheck exits non-zero if any called vulnerable symbols are found.
        # It only flags vulnerabilities actually reachable in your code — no noise.

  # ── Aggregate gate: all security jobs must pass ───────────────────────────
  security-gate:
    name: Security Gate
    needs: [trivy-filesystem, trivy-image, govulncheck]
    # Run even if some jobs were skipped (they won't fail if skipped)
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check all security results
        run: |
          FS="${{ needs.trivy-filesystem.result }}"
          IMG="${{ needs.trivy-image.result }}"
          GOVULN="${{ needs.govulncheck.result }}"

          FAILED=false
          for result in "$FS" "$IMG" "$GOVULN"; do
            if [ "$result" = "failure" ]; then
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::One or more security scans failed. Review findings above."
            exit 1
          fi
          echo "✅ All security checks passed."
