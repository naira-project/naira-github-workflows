name: Reusable · Node Lint

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "20"
      working-directory:
        description: "Directory containing package.json"
        type: string
        default: "."
      package-manager:
        description: "Package manager: npm | yarn | pnpm"
        type: string
        default: "npm"
      lint-script:
        description: "package.json script name for linting"
        type: string
        default: "lint"
      typecheck-script:
        description: "package.json script for type checking (leave empty to skip)"
        type: string
        default: "typecheck"

jobs:
  node-lint:
    name: Node Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      # ── npm ────────────────────────────────────────────────────────────────
      - name: Install dependencies (npm)
        if: inputs.package-manager == 'npm'
        run: npm ci

      # ── yarn ───────────────────────────────────────────────────────────────
      - name: Install dependencies (yarn)
        if: inputs.package-manager == 'yarn'
        run: yarn install --frozen-lockfile

      # ── pnpm ───────────────────────────────────────────────────────────────
      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Install dependencies (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile

      # ── Lint ───────────────────────────────────────────────────────────────
      - name: Run ESLint
        run: ${{ inputs.package-manager }} run ${{ inputs.lint-script }}

      - name: Run TypeScript typecheck
        if: inputs.typecheck-script != ''
        run: ${{ inputs.package-manager }} run ${{ inputs.typecheck-script }}

      # ── Formatting (Prettier) ─────────────────────────────────────────────
      - name: Check Prettier formatting
        run: |
          if [ -f ".prettierrc" ] || [ -f ".prettierrc.json" ] || [ -f "prettier.config.js" ]; then
            ${{ inputs.package-manager }} run format:check 2>/dev/null || \
              echo "::warning::No format:check script found, skipping Prettier check."
          else
            echo "No Prettier config found, skipping."
          fi
