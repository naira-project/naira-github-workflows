name: Reusable · Node Lint

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "20"
      working-directory:
        description: "Directory containing package.json"
        type: string
        default: "."
      package-manager:
        description: "Package manager: npm | yarn | pnpm"
        type: string
        default: "npm"
      lint-script:
        description: "package.json script name for linting"
        type: string
        default: "lint"
      typecheck-script:
        description: "package.json script for type checking (leave empty to skip)"
        type: string
        default: "typecheck"

jobs:
  node-lint:
    name: Node Lint & Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Resolve the correct lockfile for the chosen package manager.
      # Each package manager uses a different lockfile name; using the wrong
      # one produces incorrect cache keys and stale caches.
      - name: Resolve lockfile path
        id: lockfile
        shell: bash
        run: |
          case "${{ inputs.package-manager }}" in
            yarn) echo "path=${{ inputs.working-directory }}/yarn.lock" >> "$GITHUB_OUTPUT" ;;
            pnpm) echo "path=${{ inputs.working-directory }}/pnpm-lock.yaml" >> "$GITHUB_OUTPUT" ;;
            *)    echo "path=${{ inputs.working-directory }}/package-lock.json" >> "$GITHUB_OUTPUT" ;;
          esac

      # ── pnpm must be on PATH before actions/setup-node when cache: pnpm ───
      # setup-node needs pnpm installed first to locate the lockfile for caching.
      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ steps.lockfile.outputs.path }}

      # ── npm ────────────────────────────────────────────────────────────────
      - name: Install dependencies (npm)
        if: inputs.package-manager == 'npm'
        run: npm ci

      # ── yarn ───────────────────────────────────────────────────────────────
      - name: Install dependencies (yarn)
        if: inputs.package-manager == 'yarn'
        run: yarn install --frozen-lockfile

      # ── pnpm ───────────────────────────────────────────────────────────────
      - name: Install dependencies (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile

      # ── Lint ───────────────────────────────────────────────────────────────
      - name: Run ESLint
        run: ${{ inputs.package-manager }} run ${{ inputs.lint-script }}

      - name: Run TypeScript typecheck
        if: inputs.typecheck-script != ''
        run: ${{ inputs.package-manager }} run ${{ inputs.typecheck-script }}

      # ── Formatting (Prettier) ─────────────────────────────────────────────
      - name: Check Prettier formatting
        run: |
          if [ -f ".prettierrc" ] || [ -f ".prettierrc.json" ] || [ -f "prettier.config.js" ]; then
            ${{ inputs.package-manager }} run format:check 2>/dev/null || \
              echo "::warning::No format:check script found, skipping Prettier check."
          else
            echo "No Prettier config found, skipping."
          fi
