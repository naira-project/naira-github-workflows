name: Reusable · Go Lint

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use"
        type: string
        default: "1.22"
      working-directory:
        description: "Directory containing go.mod"
        type: string
        default: "."
      golangci-lint-version:
        description: "golangci-lint version"
        type: string
        default: "v1.57.2"
      timeout:
        description: "Lint timeout (e.g. 5m)"
        type: string
        default: "5m"
    secrets:
      # No secrets required for linting, but slot kept for future use
      token:
        required: false

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ inputs.golangci-lint-version }}-${{ runner.os }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ inputs.golangci-lint-version }}
          working-directory: ${{ inputs.working-directory }}
          args: --timeout=${{ inputs.timeout }}
          # Skip cache managed by golangci-lint itself — we manage it above
          skip-cache: false

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit." && exit 1)
