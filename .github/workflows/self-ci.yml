#
# CI for the shared-workflows repo itself.
# Validates that workflow YAML syntax is correct and REUSE headers are present.

name: Self CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Validate YAML syntax of all workflow files ────────────────────────────
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install yamllint
        run: pip install yamllint --quiet --break-system-packages

      - name: Lint workflow YAML files
        # Config is read from .yamllint in the repo root
        run: |
          yamllint \
            .github/workflows/*.yml \
            .github/actions/**/*.yml \
            examples/**/*.yml

  # ── Validate action.yml files are well-formed ─────────────────────────────
  action-lint:
    name: Action Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install actionlint
        run: |
          curl -sLo actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.3/actionlint_1.7.3_linux_amd64.tar.gz
          tar xzf actionlint.tar.gz actionlint
          sudo mv actionlint /usr/local/bin/

      - name: Run actionlint
        run: actionlint .github/workflows/*.yml

  # ── REUSE compliance on this repo ─────────────────────────────────────────
  reuse:
    name: REUSE Compliance
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  # ── DCO check on this repo ────────────────────────────────────────────────
  dco:
    name: DCO Sign-off
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: christophebedard/dco-check@7b0205d25ead0f898e0b706b58227dd5fa7e3f55 # 0.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Release (only on push to main) ───────────────────────────────────────
  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [yaml-lint, action-lint, reuse, dco]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: google-github-actions/release-please-action@e4dc86ba9405554aeba3c6bb2d169500e7d3b4ee # v4.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Gate ──────────────────────────────────────────────────────────────────
  # NOTE: `release` is intentionally excluded from this gate. It only runs on
  # push to main (not PRs), so including it would break PR branch-protection
  # rules. Release failures are visible in the Actions UI but do not block merges.
  all-checks:
    name: All Checks Passed
    needs: [yaml-lint, action-lint, reuse, dco]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          for r in \
            "${{ needs.yaml-lint.result }}" \
            "${{ needs.action-lint.result }}" \
            "${{ needs.reuse.result }}" \
            "${{ needs.dco.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::One or more checks failed."
              exit 1
            fi
          done
          echo "✅ All self-CI checks passed."
