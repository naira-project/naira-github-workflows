name: Reusable · Helm Package & Publish

on:
  workflow_call:
    inputs:
      charts-directory:
        description: "Directory containing Helm charts"
        type: string
        default: "charts"
      helm-version:
        description: "Helm CLI version"
        type: string
        default: "v3.14.4"
      publish-method:
        description: "How to publish: 'oci' (ghcr.io) or 'gh-pages'"
        type: string
        default: "oci"
      registry:
        description: "OCI registry (used when publish-method=oci)"
        type: string
        default: "ghcr.io"
      lint-only:
        description: "Only lint charts, do not package or push (useful on PRs)"
        type: boolean
        default: false
    secrets:
      registry-password:
        description: "OCI registry password / GITHUB_TOKEN"
        required: true
      cr-token:
        description: "GitHub token for chart-releaser (gh-pages method)"
        required: false

jobs:
  helm-lint:
    name: Helm Lint & Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # chart-releaser needs full history for gh-pages
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ inputs.helm-version }}

      - name: Set up chart-testing (ct)
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Detect changed charts
        id: changed
        run: |
          TARGET="${DEFAULT_BRANCH:-main}"
          CHANGED=$(ct list-changed --chart-dirs "${INPUTS_CHARTS_DIRECTORY}" --target-branch "$TARGET")
          {
            echo "charts<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$CHANGED" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          INPUTS_CHARTS_DIRECTORY: ${{ inputs.charts-directory }}

      - name: Lint changed charts
        if: steps.changed.outputs.has-changes == 'true'
        run: |
          ct lint \
            --chart-dirs "${INPUTS_CHARTS_DIRECTORY}" \
            --target-branch "${DEFAULT_BRANCH:-main}" \
            --validate-maintainers=false
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          INPUTS_CHARTS_DIRECTORY: ${{ inputs.charts-directory }}

      - name: Validate chart schemas
        run: |
          for chart in "${INPUTS_CHARTS_DIRECTORY}"/*/; do
            if [ -f "$chart/values.schema.json" ]; then
              echo "✓ Schema found for $chart"
              helm lint "$chart" --strict
            else
              echo "::warning::No values.schema.json in $chart — consider adding one."
            fi
          done
        env:
          INPUTS_CHARTS_DIRECTORY: ${{ inputs.charts-directory }}

  helm-publish-oci:
    name: Helm Publish (OCI)
    needs: helm-lint
    if: "!inputs.lint-only && inputs.publish-method == 'oci'"
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ inputs.helm-version }}

      - name: Log in to OCI registry
        run: |
          echo "${REGISTRY_PASSWORD}" | \
          helm registry login "${INPUTS_REGISTRY}" \
            --username "${GITHUB_ACTOR}" \
            --password-stdin
        env:
          INPUTS_REGISTRY: ${{ inputs.registry }}
          REGISTRY_PASSWORD: ${{ secrets.registry-password }}

      - name: Package and push all charts
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          mkdir -p /tmp/helm-packages
          for chart in "${INPUTS_CHARTS_DIRECTORY}"/*/; do
            CHART_NAME=$(basename "$chart")
            echo "📦 Packaging $CHART_NAME..."
            helm package "$chart" --destination /tmp/helm-packages/

            PACKAGE=$(find /tmp/helm-packages/ -name "${CHART_NAME}-*.tgz" -maxdepth 1 | head -1)
            if [ -z "$PACKAGE" ]; then
              echo "::error::Failed to find packaged chart for $CHART_NAME"
              exit 1
            fi
            echo "🚀 Pushing $PACKAGE to oci://${INPUTS_REGISTRY}/${OWNER}/charts"
            helm push "$PACKAGE" "oci://${INPUTS_REGISTRY}/${OWNER}/charts"
          done
        env:
          INPUTS_CHARTS_DIRECTORY: ${{ inputs.charts-directory }}
          INPUTS_REGISTRY: ${{ inputs.registry }}

      - name: Write job summary
        run: |
          echo "### ⎈ Helm Charts Published" >> "$GITHUB_STEP_SUMMARY"
          echo "**Registry:** \`oci://${INPUTS_REGISTRY}\`" >> "$GITHUB_STEP_SUMMARY"
          for chart in "${INPUTS_CHARTS_DIRECTORY}"/*/; do
            CHART_NAME=$(basename "$chart")
            VERSION=$(helm show chart "$chart" | grep '^version:' | awk '{print $2}')
            echo "- \`${CHART_NAME}:${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          done
        env:
          INPUTS_REGISTRY: ${{ inputs.registry }}
          INPUTS_CHARTS_DIRECTORY: ${{ inputs.charts-directory }}

  helm-publish-ghpages:
    name: Helm Publish (GitHub Pages)
    needs: helm-lint
    if: "!inputs.lint-only && inputs.publish-method == 'gh-pages'"
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: ${{ inputs.charts-directory }}
        env:
          CR_TOKEN: ${{ secrets.cr-token }}
