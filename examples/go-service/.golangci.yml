# Standard golangci-lint config for all Naira Go services.
# Copy to your repo root as .golangci.yml

run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck        # Check for unhandled errors
    - gosimple        # Simplify code
    - govet           # Vet examines Go source code
    - ineffassign     # Detect ineffectual assignments
    - staticcheck     # Staticcheck is a state-of-the-art linter
    - unused          # Check for unused code
    - gofmt           # Checks whether code was gofmt-ed
    - goimports       # Check import ordering
    - gocritic        # Opinionated Go linter
    - misspell        # Correct commonly misspelled English words
    - revive          # Drop-in replacement for golint
    - godot           # Checks that comments end with a period
    - noctx           # Finds functions sending HTTP requests without context
    - bodyclose       # Checks HTTP response body is closed
    - exportloopref   # Checks for pointers to loop variables (Go < 1.22)
    - gosec           # Security linter

linters-settings:
  goimports:
    local-prefixes: github.com/naira-project

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - commentedOutCode

  gosec:
    excludes:
      - G104   # Unhandled errors (covered by errcheck)
      - G304   # File path provided as taint input — review per repo

  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

issues:
  exclude-rules:
    # Allow missing error checks in test files
    - path: "_test\\.go"
      linters: [errcheck, gosec]
    # Allow unkeyed struct literals in test files
    - path: "_test\\.go"
      text: "composites"
  max-issues-per-linter: 50
  max-same-issues: 10
